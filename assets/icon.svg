<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="50%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#606060"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0B0B0"/>
      <stop offset="100%" stop-color="#787878"/>
    </linearGradient>
    <linearGradient id="chip" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(128, 120)">
    <!-- Box faces -->
    <polygon points="0,-70 95,-24 0,22 -95,-24" fill="url(#top)" stroke="#999" stroke-width="1"/>
    <polygon points="-95,-24 0,22 0,112 -95,66" fill="url(#left)" stroke="#888" stroke-width="1"/>
    <polygon points="95,-24 0,22 0,112 95,66" fill="url(#right)" stroke="#888" stroke-width="1"/>

    <!-- GPU chip on top -->
    <g transform="translate(0, -24)">
      <polygon points="0,-30 48,-6 0,18 -48,-6" fill="url(#chip)" stroke="#1D4ED8" stroke-width="1" filter="url(#g)"/>
      <polygon points="0,-18 28,-4 0,10 -28,-4" fill="#1E3A5F" stroke="#60A5FA" stroke-width="0.7" opacity="0.9"/>
    </g>

    <!-- Vent slots -->
    <g opacity="0.3">
      <line x1="24" y1="44" x2="72" y2="22" stroke="#555" stroke-width="1.5"/>
      <line x1="24" y1="54" x2="72" y2="32" stroke="#555" stroke-width="1.5"/>
      <line x1="24" y1="64" x2="72" y2="42" stroke="#555" stroke-width="1.5"/>
      <line x1="24" y1="74" x2="72" y2="52" stroke="#555" stroke-width="1.5"/>
    </g>

    <!-- LED -->
    <circle cx="-58" cy="62" r="3.5" fill="#22C55E" filter="url(#g)"/>
  </g>
</svg>
