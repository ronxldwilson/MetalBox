<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MetalBox</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --orange: #db6d28;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; }

  .header {
    padding: 20px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { color: var(--text2); font-weight: 400; font-size: 14px; margin-left: 8px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
  .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.red { background: var(--red); }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }

  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .summary-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-card .value { font-size: 28px; font-weight: 600; margin-top: 4px; }
  .summary-card .value.green { color: var(--green); }

  .services-table {
    width: 100%; border-collapse: collapse; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .services-table th {
    text-align: left; padding: 12px 16px; font-size: 12px; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  .services-table th:hover { color: var(--accent); }
  .services-table th .sort-arrow { margin-left: 4px; font-size: 10px; }
  .services-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .services-table tr:last-child td { border-bottom: none; }
  .services-table tr:hover td { background: rgba(88,166,255,0.04); }

  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .badge.running { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge.stopped { background: rgba(139,148,158,0.15); color: var(--text2); }
  .badge.dead { background: rgba(248,81,73,0.15); color: var(--red); }

  .bar-bg { width: 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .bar-fill.ok { background: var(--green); }
  .bar-fill.warn { background: var(--yellow); }
  .bar-fill.danger { background: var(--red); }

  .mem-cell { display: flex; align-items: center; gap: 10px; }
  .mem-text { font-size: 13px; color: var(--text2); min-width: 100px; }

  .actions { display: flex; gap: 6px; }
  .btn {
    padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface); color: var(--text); font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.1); }

  .panel {
    margin-top: 24px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; display: none;
  }
  .panel.open { display: block; }
  .panel-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-header h3 { font-size: 14px; }
  .panel-tabs { display: flex; gap: 4px; }
  .panel-tab {
    padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    color: var(--text2); background: transparent; border: none;
  }
  .panel-tab.active { color: var(--text); background: var(--border); }
  .panel-body {
    padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    color: var(--text2); max-height: 400px; overflow-y: auto; white-space: pre-wrap; line-height: 1.6;
  }

  .event { padding: 4px 0; display: flex; gap: 12px; }
  .event-time { color: var(--text2); min-width: 80px; }
  .event-type { font-weight: 500; min-width: 90px; }
  .event-type.started { color: var(--green); }
  .event-type.stopped { color: var(--text2); }
  .event-type.oom-kill { color: var(--red); }
  .event-type.restarting { color: var(--yellow); }
  .event-type.taskpolicy { color: var(--accent); }
  .event-type.isolation { color: var(--accent); }
  .event-type.sandbox { color: var(--orange); }
  .event-type.ports { color: var(--green); }
  .event-type.metal { color: var(--yellow); }
  .event-msg { color: var(--text); }

  .cpu-badge {
    display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: 11px;
  }
  .cpu-badge.background { background: rgba(88,166,255,0.15); color: var(--accent); }
  .cpu-badge.default { background: rgba(139,148,158,0.1); color: var(--text2); }

  .refresh-info { font-size: 12px; color: var(--text2); }

  .gpu-info { font-size: 12px; color: var(--text2); }
  .gpu-info strong { color: var(--yellow); font-weight: 500; }

  .sparkline { display: inline-block; vertical-align: middle; }
  .sparkline svg { display: block; }

  .charts-wrap { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  .chart-box { position: relative; }
  .chart-box .chart-label {
    font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 6px; display: flex; justify-content: space-between;
  }
  .chart-box .chart-label .chart-value { color: var(--text); font-weight: 500; }
  .chart-box canvas { width: 100%; height: 140px; border-radius: 6px; background: var(--bg); }
</style>
</head>
<body>

<div class="header">
  <h1><span class="status-dot green" id="conn-dot"></span>MetalBox<span>Dashboard</span></h1>
  <div class="refresh-info">auto-refresh 3s</div>
</div>

<div class="container">
  <div class="summary">
    <div class="summary-card">
      <div class="label">Services</div>
      <div class="value" id="s-total">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Running</div>
      <div class="value green" id="s-running">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Stopped</div>
      <div class="value" id="s-stopped">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Total RSS</div>
      <div class="value" id="s-rss">-</div>
    </div>
  </div>

  <table class="services-table">
    <thead>
      <tr>
        <th onclick="sortBy('name')">Service<span class="sort-arrow" id="sort-name"></span></th>
        <th onclick="sortBy('status')">Status<span class="sort-arrow" id="sort-status"></span></th>
        <th onclick="sortBy('pid')">PID<span class="sort-arrow" id="sort-pid"></span></th>
        <th onclick="sortBy('memory')">Memory<span class="sort-arrow" id="sort-memory"></span></th>
        <th onclick="sortBy('gpu')">GPU<span class="sort-arrow" id="sort-gpu"></span></th>
        <th onclick="sortBy('cpu')">CPU<span class="sort-arrow" id="sort-cpu"></span></th>
        <th onclick="sortBy('uptime')">Uptime<span class="sort-arrow" id="sort-uptime"></span></th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="svc-body"></tbody>
  </table>

  <div class="panel" id="detail-panel">
    <div class="panel-header">
      <h3 id="panel-title">Details</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="panel-tabs">
          <button class="panel-tab" onclick="switchTab('charts')">Charts</button>
          <button class="panel-tab active" onclick="switchTab('logs')">Logs</button>
          <button class="panel-tab" onclick="switchTab('events')">Events</button>
        </div>
        <button class="btn" onclick="closePanel()">Close</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<script>
let services = [];
let activePanel = null;
let activeTab = 'logs';
let logRefreshInterval = null;
let sortCol = null;
let sortAsc = true;

async function fetchServices() {
  try {
    const r = await fetch('/api/services');
    services = await r.json();
    if (!services) services = [];
    render();
    document.getElementById('conn-dot').className = 'status-dot green';
  } catch {
    document.getElementById('conn-dot').className = 'status-dot red';
  }
}

function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = true; }
  render();
}

function getSortValue(s, col) {
  switch (col) {
    case 'name': return s.name || '';
    case 'status': return s.status || '';
    case 'pid': return s.pid || 0;
    case 'memory': return s.rss_mb || 0;
    case 'gpu': return (s.gpu && s.gpu.active_mb) || 0;
    case 'cpu': return s.cpu_percent || 0;
    case 'uptime': return s.uptime_seconds || 0;
    case 'restarts': return s.restarts || 0;
    default: return 0;
  }
}

function render() {
  const total = services.length;
  const running = services.filter(s => s.status === 'running').length;
  const stopped = total - running;
  const totalRSS = services.reduce((a, s) => a + (s.rss_mb || 0), 0);

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-running').textContent = running;
  document.getElementById('s-stopped').textContent = stopped;
  document.getElementById('s-rss').textContent = totalRSS > 0 ? Math.round(totalRSS) + ' MB' : '-';

  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  if (sortCol) {
    const arrow = document.getElementById('sort-' + sortCol);
    if (arrow) arrow.textContent = sortAsc ? ' ▲' : ' ▼';
  }

  let sorted = [...services];
  if (sortCol) {
    sorted.sort((a, b) => {
      const va = getSortValue(a, sortCol), vb = getSortValue(b, sortCol);
      const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
      return sortAsc ? cmp : -cmp;
    });
  }

  const tbody = document.getElementById('svc-body');
  tbody.innerHTML = sorted.map(s => {
    const isRunning = s.status === 'running';
    const rss = s.rss_mb ? s.rss_mb.toFixed(0) : '-';
    const limitMB = s.limit_mb ? s.limit_mb.toFixed(0) : null;
    const limit = limitMB ? limitMB + 'MB' : '-';
    const pct = (s.rss_mb && s.limit_mb) ? Math.min(100, (s.rss_mb / s.limit_mb) * 100) : 0;
    const barClass = pct > 90 ? 'danger' : pct > 70 ? 'warn' : 'ok';
    const cpu = s.cpu_percent != null ? s.cpu_percent.toFixed(1) + '%' : '-';
    const cpuMode = s.cpu_mode || 'default';
    const restartBadge = s.restarts > 0 ? ` <span style="color:var(--yellow);font-size:11px">(${s.restarts}x)</span>` : '';

    const gpuHtml = s.gpu && s.gpu.active_mb != null
      ? `<span class="gpu-info"><strong>${s.gpu.active_mb.toFixed(0)}MB</strong>${s.gpu.limit_mb ? ' / ' + s.gpu.limit_mb.toFixed(0) + 'MB' : ''}</span>`
      : '<span style="color:var(--text2)">-</span>';

    const sparkHtml = s.history && s.history.length > 1 ? buildSparkline(s.history.map(h => h.rss_mb), 80, 20) : '';

    return `<tr>
      <td><strong>${s.name}</strong>${restartBadge}</td>
      <td><span class="badge ${s.status}">${s.status}</span></td>
      <td style="color:var(--text2)">${s.pid || '-'}</td>
      <td>
        <div class="mem-cell">
          <div class="mem-text">${rss}${limitMB ? ' / ' + limit : ''}</div>
          ${pct > 0 ? `<div class="bar-bg"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>` : ''}
          ${sparkHtml}
        </div>
      </td>
      <td>${gpuHtml}</td>
      <td>
        ${cpu}
        ${cpuMode !== 'default' && cpuMode ? `<span class="cpu-badge ${cpuMode}">${cpuMode}</span>` : ''}
      </td>
      <td style="color:var(--text2)">${s.uptime || '-'}</td>
      <td>
        <div class="actions">
          ${isRunning
            ? `<button class="btn danger" onclick="svcAction('${s.name}','stop')">Stop</button>
               <button class="btn" onclick="svcAction('${s.name}','restart')">Restart</button>`
            : `<button class="btn" onclick="svcAction('${s.name}','start')">Start</button>`
          }
          <button class="btn ${activePanel === s.name ? 'active' : ''}" onclick="openPanel('${s.name}')">Details</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function svcAction(name, action) {
  try {
    const r = await fetch('/api/services/' + name + '/' + action, { method: 'POST' });
    const data = await r.json();
    if (data.error) console.error(data.error);
    setTimeout(fetchServices, 500);
  } catch(e) {
    console.error(e);
  }
}

async function openPanel(name) {
  activePanel = name;
  activeTab = 'logs';
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('panel-title').textContent = name;
  updateTabs();
  await loadPanelContent();

  if (logRefreshInterval) clearInterval(logRefreshInterval);
  logRefreshInterval = setInterval(loadPanelContent, 3000);

  render();
}

function closePanel() {
  activePanel = null;
  document.getElementById('detail-panel').classList.remove('open');
  if (logRefreshInterval) { clearInterval(logRefreshInterval); logRefreshInterval = null; }
  render();
}

function switchTab(tab) {
  activeTab = tab;
  updateTabs();
  loadPanelContent();
}

function updateTabs() {
  document.querySelectorAll('.panel-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.toLowerCase() === activeTab);
  });
}

async function loadPanelContent() {
  if (!activePanel) return;
  const body = document.getElementById('panel-body');

  if (activeTab === 'charts') {
    body.style.whiteSpace = 'normal';
    body.style.fontFamily = 'inherit';
    const svc = services.find(s => s.name === activePanel);
    if (!svc || !svc.history || svc.history.length < 2) {
      body.innerHTML = '<span style="color:var(--text2)">waiting for data... (samples collected every 5s)</span>';
      return;
    }
    const h = svc.history;
    const lastRSS = h[h.length - 1].rss_mb;
    const lastCPU = h[h.length - 1].cpu;
    const limitMB = svc.limit_mb;
    const gpu = svc.gpu;

    let html = `<div class="charts-wrap">
      <div class="chart-box">
        <div class="chart-label">
          <span>RSS Memory</span>
          <span class="chart-value">${lastRSS.toFixed(0)} MB${limitMB ? ' / ' + limitMB.toFixed(0) + ' MB' : ''}</span>
        </div>
        <canvas id="chart-rss" height="140"></canvas>
      </div>
      <div class="chart-box">
        <div class="chart-label">
          <span>CPU Usage</span>
          <span class="chart-value">${lastCPU.toFixed(1)}%</span>
        </div>
        <canvas id="chart-cpu" height="140"></canvas>
      </div>`;

    if (gpu && gpu.active_mb != null) {
      html += `<div class="chart-box">
        <div class="chart-label">
          <span>GPU Memory (Metal)</span>
          <span class="chart-value">${gpu.active_mb.toFixed(0)} MB${gpu.limit_mb ? ' / ' + gpu.limit_mb.toFixed(0) + ' MB' : ''}</span>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:6px;font-size:13px;color:var(--text2)">
          Active: <strong style="color:var(--yellow)">${gpu.active_mb.toFixed(0)} MB</strong>
          &nbsp;&nbsp;Peak: <strong style="color:var(--orange)">${gpu.peak_mb.toFixed(0)} MB</strong>
          &nbsp;&nbsp;Cache: <strong style="color:var(--accent)">${gpu.cache_mb.toFixed(0)} MB</strong>
        </div>
      </div>`;
    }
    html += '</div>';
    body.innerHTML = html;

    drawChart('chart-rss', h.map(p => p.rss_mb), {
      color: '#3fb950', fillColor: 'rgba(63,185,80,0.1)',
      limitLine: limitMB, unit: 'MB'
    });
    drawChart('chart-cpu', h.map(p => p.cpu), {
      color: '#58a6ff', fillColor: 'rgba(88,166,255,0.1)',
      maxVal: Math.max(100, ...h.map(p => p.cpu)), unit: '%'
    });
    return;
  }

  body.style.whiteSpace = 'pre-wrap';
  body.style.fontFamily = "'SF Mono', 'Fira Code', monospace";

  if (activeTab === 'logs') {
    try {
      const r = await fetch('/api/logs/' + activePanel + '?lines=200');
      const text = await r.text();
      const wasAtBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 50;
      body.textContent = text || 'no logs yet';
      if (wasAtBottom) body.scrollTop = body.scrollHeight;
    } catch {
      body.textContent = 'failed to load logs';
    }
  } else if (activeTab === 'events') {
    const svc = services.find(s => s.name === activePanel);
    if (!svc || !svc.events || svc.events.length === 0) {
      body.innerHTML = '<span style="color:var(--text2)">no events yet</span>';
      return;
    }
    body.innerHTML = svc.events.map(e => {
      const t = new Date(e.time).toLocaleTimeString();
      return `<div class="event">
        <span class="event-time">${t}</span>
        <span class="event-type ${e.type}">${e.type}</span>
        <span class="event-msg">${e.message}</span>
      </div>`;
    }).join('');
  }
}

function drawChart(canvasId, data, opts) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const w = rect.width, h = rect.height;
  const pad = { top: 10, right: 12, bottom: 24, left: 48 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  const maxVal = opts.maxVal || opts.limitLine || Math.max(...data) * 1.2 || 1;
  const minVal = 0;

  // grid lines
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  const gridLines = 4;
  for (let i = 0; i <= gridLines; i++) {
    const y = pad.top + (ch / gridLines) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();

    const val = maxVal - (maxVal / gridLines) * i;
    ctx.fillStyle = '#8b949e';
    ctx.font = '10px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(0) + (opts.unit || ''), pad.left - 6, y + 3);
  }

  // time labels
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'center';
  ctx.font = '10px -apple-system, system-ui, sans-serif';
  const totalSec = data.length * 5;
  const labels = [0, Math.floor(data.length / 2), data.length - 1];
  labels.forEach(i => {
    const x = pad.left + (i / (data.length - 1)) * cw;
    const ago = (data.length - 1 - i) * 5;
    ctx.fillText(ago === 0 ? 'now' : `-${ago}s`, x, h - 4);
  });

  // limit line
  if (opts.limitLine) {
    const ly = pad.top + ch - (opts.limitLine / maxVal) * ch;
    ctx.strokeStyle = '#f8514980';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(pad.left, ly);
    ctx.lineTo(w - pad.right, ly);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#f85149';
    ctx.textAlign = 'left';
    ctx.fillText('limit', w - pad.right + 2, ly + 3);
  }

  // data line + fill
  const points = data.map((v, i) => ({
    x: pad.left + (i / (data.length - 1)) * cw,
    y: pad.top + ch - (v / maxVal) * ch
  }));

  // fill
  ctx.beginPath();
  ctx.moveTo(points[0].x, pad.top + ch);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length - 1].x, pad.top + ch);
  ctx.closePath();
  ctx.fillStyle = opts.fillColor;
  ctx.fill();

  // line
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = opts.color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.stroke();

  // current value dot
  const last = points[points.length - 1];
  ctx.beginPath();
  ctx.arc(last.x, last.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = opts.color;
  ctx.fill();
}

function buildSparkline(data, w, h) {
  if (!data || data.length < 2) return '';
  const max = Math.max(...data) || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - (v / max) * (h - 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<span class="sparkline"><svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg></span>`;
}

fetchServices();
setInterval(fetchServices, 3000);
</script>
</body>
</html>
