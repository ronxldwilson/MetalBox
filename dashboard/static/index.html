<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MetalBox</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --orange: #db6d28;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; }

  .header {
    padding: 20px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { color: var(--text2); font-weight: 400; font-size: 14px; margin-left: 8px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
  .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.red { background: var(--red); }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }

  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .summary-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-card .value { font-size: 28px; font-weight: 600; margin-top: 4px; }
  .summary-card .value.green { color: var(--green); }

  .services-table {
    width: 100%; border-collapse: collapse; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .services-table th {
    text-align: left; padding: 12px 16px; font-size: 12px; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
  }
  .services-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .services-table tr:last-child td { border-bottom: none; }
  .services-table tr:hover td { background: rgba(88,166,255,0.04); }

  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .badge.running { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge.stopped { background: rgba(139,148,158,0.15); color: var(--text2); }
  .badge.dead { background: rgba(248,81,73,0.15); color: var(--red); }

  .bar-bg { width: 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .bar-fill.ok { background: var(--green); }
  .bar-fill.warn { background: var(--yellow); }
  .bar-fill.danger { background: var(--red); }

  .mem-cell { display: flex; align-items: center; gap: 10px; }
  .mem-text { font-size: 13px; color: var(--text2); min-width: 100px; }

  .actions { display: flex; gap: 6px; }
  .btn {
    padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface); color: var(--text); font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.1); }

  .panel {
    margin-top: 24px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; display: none;
  }
  .panel.open { display: block; }
  .panel-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-header h3 { font-size: 14px; }
  .panel-tabs { display: flex; gap: 4px; }
  .panel-tab {
    padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    color: var(--text2); background: transparent; border: none;
  }
  .panel-tab.active { color: var(--text); background: var(--border); }
  .panel-body {
    padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    color: var(--text2); max-height: 400px; overflow-y: auto; white-space: pre-wrap; line-height: 1.6;
  }

  .event { padding: 4px 0; display: flex; gap: 12px; }
  .event-time { color: var(--text2); min-width: 80px; }
  .event-type { font-weight: 500; min-width: 90px; }
  .event-type.started { color: var(--green); }
  .event-type.stopped { color: var(--text2); }
  .event-type.oom-kill { color: var(--red); }
  .event-type.restarting { color: var(--yellow); }
  .event-type.taskpolicy { color: var(--accent); }
  .event-type.isolation { color: var(--accent); }
  .event-type.sandbox { color: var(--orange); }
  .event-type.ports { color: var(--green); }
  .event-type.metal { color: var(--yellow); }
  .event-msg { color: var(--text); }

  .cpu-badge {
    display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: 11px;
  }
  .cpu-badge.background { background: rgba(88,166,255,0.15); color: var(--accent); }
  .cpu-badge.default { background: rgba(139,148,158,0.1); color: var(--text2); }

  .refresh-info { font-size: 12px; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <h1><span class="status-dot green" id="conn-dot"></span>MetalBox<span>Dashboard</span></h1>
  <div class="refresh-info">auto-refresh 3s</div>
</div>

<div class="container">
  <div class="summary">
    <div class="summary-card">
      <div class="label">Services</div>
      <div class="value" id="s-total">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Running</div>
      <div class="value green" id="s-running">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Stopped</div>
      <div class="value" id="s-stopped">-</div>
    </div>
    <div class="summary-card">
      <div class="label">Total RSS</div>
      <div class="value" id="s-rss">-</div>
    </div>
  </div>

  <table class="services-table">
    <thead>
      <tr>
        <th>Service</th>
        <th>Status</th>
        <th>PID</th>
        <th>Memory</th>
        <th>CPU</th>
        <th>Uptime</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="svc-body"></tbody>
  </table>

  <div class="panel" id="detail-panel">
    <div class="panel-header">
      <h3 id="panel-title">Details</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="panel-tabs">
          <button class="panel-tab active" onclick="switchTab('logs')">Logs</button>
          <button class="panel-tab" onclick="switchTab('events')">Events</button>
        </div>
        <button class="btn" onclick="closePanel()">Close</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<script>
let services = [];
let activePanel = null;
let activeTab = 'logs';
let logRefreshInterval = null;

async function fetchServices() {
  try {
    const r = await fetch('/api/services');
    services = await r.json();
    if (!services) services = [];
    render();
    document.getElementById('conn-dot').className = 'status-dot green';
  } catch {
    document.getElementById('conn-dot').className = 'status-dot red';
  }
}

function render() {
  const total = services.length;
  const running = services.filter(s => s.status === 'running').length;
  const stopped = total - running;
  const totalRSS = services.reduce((a, s) => a + (s.rss_mb || 0), 0);

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-running').textContent = running;
  document.getElementById('s-stopped').textContent = stopped;
  document.getElementById('s-rss').textContent = totalRSS > 0 ? Math.round(totalRSS) + ' MB' : '-';

  const tbody = document.getElementById('svc-body');
  tbody.innerHTML = services.map(s => {
    const isRunning = s.status === 'running';
    const rss = s.rss_mb ? s.rss_mb.toFixed(0) : '-';
    const limitMB = s.limit_mb ? s.limit_mb.toFixed(0) : null;
    const limit = limitMB ? limitMB + 'MB' : '-';
    const pct = (s.rss_mb && s.limit_mb) ? Math.min(100, (s.rss_mb / s.limit_mb) * 100) : 0;
    const barClass = pct > 90 ? 'danger' : pct > 70 ? 'warn' : 'ok';
    const cpu = s.cpu_percent != null ? s.cpu_percent.toFixed(1) + '%' : '-';
    const cpuMode = s.cpu_mode || 'default';
    const restartBadge = s.restarts > 0 ? ` <span style="color:var(--yellow);font-size:11px">(${s.restarts}x)</span>` : '';

    return `<tr>
      <td><strong>${s.name}</strong>${restartBadge}</td>
      <td><span class="badge ${s.status}">${s.status}</span></td>
      <td style="color:var(--text2)">${s.pid || '-'}</td>
      <td>
        <div class="mem-cell">
          <div class="mem-text">${rss}${limitMB ? ' / ' + limit : ''}</div>
          ${pct > 0 ? `<div class="bar-bg"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>` : ''}
        </div>
      </td>
      <td>
        ${cpu}
        ${cpuMode !== 'default' && cpuMode ? `<span class="cpu-badge ${cpuMode}">${cpuMode}</span>` : ''}
      </td>
      <td style="color:var(--text2)">${s.uptime || '-'}</td>
      <td>
        <div class="actions">
          ${isRunning
            ? `<button class="btn danger" onclick="svcAction('${s.name}','stop')">Stop</button>
               <button class="btn" onclick="svcAction('${s.name}','restart')">Restart</button>`
            : `<button class="btn" onclick="svcAction('${s.name}','start')">Start</button>`
          }
          <button class="btn ${activePanel === s.name ? 'active' : ''}" onclick="openPanel('${s.name}')">Details</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function svcAction(name, action) {
  try {
    const r = await fetch('/api/services/' + name + '/' + action, { method: 'POST' });
    const data = await r.json();
    if (data.error) console.error(data.error);
    setTimeout(fetchServices, 500);
  } catch(e) {
    console.error(e);
  }
}

async function openPanel(name) {
  activePanel = name;
  activeTab = 'logs';
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('panel-title').textContent = name;
  updateTabs();
  await loadPanelContent();

  if (logRefreshInterval) clearInterval(logRefreshInterval);
  logRefreshInterval = setInterval(loadPanelContent, 3000);

  render();
}

function closePanel() {
  activePanel = null;
  document.getElementById('detail-panel').classList.remove('open');
  if (logRefreshInterval) { clearInterval(logRefreshInterval); logRefreshInterval = null; }
  render();
}

function switchTab(tab) {
  activeTab = tab;
  updateTabs();
  loadPanelContent();
}

function updateTabs() {
  document.querySelectorAll('.panel-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.toLowerCase() === activeTab);
  });
}

async function loadPanelContent() {
  if (!activePanel) return;
  const body = document.getElementById('panel-body');

  if (activeTab === 'logs') {
    try {
      const r = await fetch('/api/logs/' + activePanel + '?lines=200');
      const text = await r.text();
      const wasAtBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 50;
      body.textContent = text || 'no logs yet';
      if (wasAtBottom) body.scrollTop = body.scrollHeight;
    } catch {
      body.textContent = 'failed to load logs';
    }
  } else if (activeTab === 'events') {
    const svc = services.find(s => s.name === activePanel);
    if (!svc || !svc.events || svc.events.length === 0) {
      body.innerHTML = '<span style="color:var(--text2)">no events yet</span>';
      return;
    }
    body.innerHTML = svc.events.map(e => {
      const t = new Date(e.time).toLocaleTimeString();
      return `<div class="event">
        <span class="event-time">${t}</span>
        <span class="event-type ${e.type}">${e.type}</span>
        <span class="event-msg">${e.message}</span>
      </div>`;
    }).join('');
  }
}

fetchServices();
setInterval(fetchServices, 3000);
</script>
</body>
</html>
