name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            platform_tag: macosx_14_0_arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            platform_tag: macosx_13_0_x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling

      - name: Build Go binary
        run: |
          cd dashboard
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ../metalbox/bin/metalbox-dashboard .
          chmod +x ../metalbox/bin/metalbox-dashboard
          touch ../metalbox/bin/__init__.py

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in pyproject.toml
        run: |
          sed -i '' "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Build wheel
        run: pip wheel . --no-deps -w dist/

      - name: Retag wheel as platform-specific
        run: |
          WHEEL=$(ls dist/metalbox-*.whl)
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ matrix.platform_tag }}
          TAGGED="dist/metalbox-${VERSION}-py3-none-${TAG}.whl"

          python3 -c "
          import zipfile, os

          src = '$WHEEL'
          dst = '$TAGGED'
          tag = '$TAG'
          tmp = dst + '.tmp'

          with zipfile.ZipFile(src, 'r') as zin, zipfile.ZipFile(tmp, 'w') as zout:
              for item in zin.infolist():
                  data = zin.read(item.filename)
                  if item.filename.endswith('/WHEEL'):
                      data = data.replace(b'Tag: py3-none-any', b'Tag: py3-none-' + tag.encode())
                      data = data.replace(b'Root-Is-Purelib: true', b'Root-Is-Purelib: false')
                  zout.writestr(item, data)

          os.replace(tmp, dst)
          if src != dst:
              os.remove(src)
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform_tag }}
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*.whl
